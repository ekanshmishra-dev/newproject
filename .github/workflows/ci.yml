name: CI - Test & Lint

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [auth, gateway, chat, notification]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          npm ci --workspace=@service-hub/${{ matrix.service }}
      
      - name: Run linter
        run: npm run lint --workspace=@service-hub/${{ matrix.service }}
        continue-on-error: true
      
      - name: Run tests
        run: npm test --workspace=@service-hub/${{ matrix.service }}
        continue-on-error: true
      
      - name: Check build
        run: npm run build --workspace=@service-hub/${{ matrix.service }}
        continue-on-error: true

  docker-build-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker images (test only)
        run: docker-compose build
      
      - name: Test Docker Compose
        run: |
          docker-compose up -d
          sleep 30
          docker-compose ps
          docker-compose down
