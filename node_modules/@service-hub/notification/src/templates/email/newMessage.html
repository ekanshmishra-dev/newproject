<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e5e7eb; border-radius: 8px; }
    .header { background: #4F46E5; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
    .content { padding: 20px; background: #f9fafb; }
    .button { display: inline-block; background: #4F46E5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; margin-top: 20px; }
    .footer { text-align: center; font-size: 12px; color: #6b7280; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>New Message from {{senderName}}</h1>
    </div>
    <div class="content">
      <p>Hi {{userName}},</p>
      <p>You have a new message in <strong>{{roomName}}</strong>:</p>
      <blockquote style="border-left: 4px solid #4F46E5; padding-left: 15px; font-style: italic;">
        {{messagePreview}}
      </blockquote>
      <a href="{{appUrl}}/chat/{{roomId}}" class="button">View Message</a>
    </div>
    <div class="footer">
      <p>This is an automated notification from Service Hub.</p>
    </div>
  </div>
</body>
</html>
